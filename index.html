<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Enhancer</title>
  <style>
    body { 
      font-family: Arial, sans-serif; 
      padding: 20px;
      max-width: 1400px;
      margin: 0 auto;
    }
    
    .controls {
      margin-bottom: 20px;
    }
    
    .comparison {
      display: flex;
      gap: 20px;
      margin-top: 20px;
      flex-wrap: wrap;
    }
    
    .image-container {
      flex: 1;
      min-width: 300px;
    }
    
    .image-container h3 {
      margin: 0 0 10px 0;
      color: #333;
    }
    
    .image-container img {
      max-width: 100%;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    
    .params {
      background: #f9f9f9;
      padding: 15px;
      border-radius: 4px;
      margin-top: 20px;
      border-left: 4px solid #4CAF50;
    }
    
    .params h3 {
      margin: 0 0 10px 0;
      color: #333;
    }
    
    .param-item {
      display: flex;
      justify-content: space-between;
      padding: 5px 0;
      border-bottom: 1px solid #eee;
    }
    
    .param-item:last-child {
      border-bottom: none;
    }
    
    .param-label {
      font-weight: bold;
      color: #555;
    }
    
    .param-value {
      color: #2196F3;
      font-family: monospace;
    }
    
    #status {
      margin-top: 10px;
      font-weight: bold;
      color: #666;
    }
    
    #log { 
      background: #f5f5f5; 
      padding: 10px; 
      margin-top: 20px; 
      font-family: monospace; 
      font-size: 12px;
      max-height: 300px;
      overflow-y: auto;
      border-radius: 4px;
    }
    
    .log-entry { 
      margin: 2px 0; 
      padding: 2px;
    }
    
    .log-error { 
      color: #d32f2f; 
      background: #ffebee;
    }
    
    .log-success { 
      color: #388e3c; 
      background: #e8f5e9;
    }
    
    .hidden {
      display: none;
    }
  </style>
  <script type="module" crossorigin src="./assets/index-Dh0tzMKU.js"></script>
</head>
<body>
  <h2>Image Enhancer</h2>
  
  <div class="controls">
    <input type="file" id="fileInput" accept="image/*,.heic,.heif">
    <div id="status">Ожидание...</div>
  </div>
  
  <div id="results" class="hidden">
    <div class="comparison">
      <div class="image-container">
        <h3>Исходное изображение</h3>
        <img id="originalImg" alt="Оригинал">
      </div>
      
      <div class="image-container">
        <h3>Улучшенное изображение</h3>
        <img id="resultImg" alt="Результат">
      </div>
    </div>
    
    <div id="params" class="params">
      <h3>Параметры коррекции</h3>
      <div class="param-item">
        <span class="param-label">Яркость (Brightness):</span>
        <span class="param-value" id="brightnessValue">-</span>
      </div>
      <div class="param-item">
        <span class="param-label">Контрастность (Contrast):</span>
        <span class="param-value" id="contrastValue">-</span>
      </div>
      <div class="param-item">
        <span class="param-label">Цветность (Saturation):</span>
        <span class="param-value" id="saturationValue">-</span>
      </div>
    </div>
  </div>
  
  <div id="log"></div>
  
</body>
</html>
