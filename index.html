<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Enhancer</title>
  <style>
    body { 
      font-family: Arial, sans-serif; 
      padding: 20px;
      max-width: 1400px;
      margin: 0 auto;
    }
    
    .controls {
      margin-bottom: 20px;
    }
    
    .comparison {
      display: flex;
      gap: 20px;
      margin-top: 20px;
      flex-wrap: wrap;
    }
    
    .image-container {
      flex: 1;
      min-width: 300px;
    }
    
    .image-container h3 {
      margin: 0 0 10px 0;
      color: #333;
    }
    
    .image-container img {
      max-width: 100%;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    
    .params {
      background: #f9f9f9;
      padding: 15px;
      border-radius: 4px;
      margin-top: 20px;
      border-left: 4px solid #4CAF50;
    }
    
    .params h3 {
      margin: 0 0 10px 0;
      color: #333;
    }
    
    .param-item {
      display: flex;
      justify-content: space-between;
      padding: 5px 0;
      border-bottom: 1px solid #eee;
    }
    
    .param-item:last-child {
      border-bottom: none;
    }
    
    .param-label {
      font-weight: bold;
      color: #555;
    }
    
    .param-value {
      color: #2196F3;
      font-family: monospace;
    }
    
    #status {
      margin-top: 10px;
      font-weight: bold;
      color: #666;
    }
    
    #log { 
      background: #f5f5f5; 
      padding: 10px; 
      margin-top: 20px; 
      font-family: monospace; 
      font-size: 12px;
      max-height: 300px;
      overflow-y: auto;
      border-radius: 4px;
    }
    
    .log-entry { 
      margin: 2px 0; 
      padding: 2px;
    }
    
    .log-error { 
      color: #d32f2f; 
      background: #ffebee;
    }
    
    .log-success { 
      color: #388e3c; 
      background: #e8f5e9;
    }
    
    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <h2>Image Enhancer</h2>
  
  <div class="controls">
    <input type="file" id="fileInput" accept="image/*,.heic,.heif">
    <div id="status">Ожидание...</div>
  </div>
  
  <div id="results" class="hidden">
    <div class="comparison">
      <div class="image-container">
        <h3>Исходное изображение</h3>
        <img id="originalImg" alt="Оригинал">
      </div>
      
      <div class="image-container">
        <h3>Улучшенное изображение</h3>
        <img id="resultImg" alt="Результат">
      </div>
    </div>
    
    <div id="params" class="params">
      <h3>Параметры коррекции</h3>
      <div class="param-item">
        <span class="param-label">Яркость (Brightness):</span>
        <span class="param-value" id="brightnessValue">-</span>
      </div>
      <div class="param-item">
        <span class="param-label">Контрастность (Contrast):</span>
        <span class="param-value" id="contrastValue">-</span>
      </div>
      <div class="param-item">
        <span class="param-label">Цветность (Saturation):</span>
        <span class="param-value" id="saturationValue">-</span>
      </div>
    </div>
  </div>
  
  <div id="log"></div>
  
  <script type="module">
    import { ImageEnhancer } from './src/index.ts';

    const enhancer = new ImageEnhancer();
    const statusDiv = document.getElementById('status');
    const resultsDiv = document.getElementById('results');
    const originalImg = document.getElementById('originalImg');
    const resultImg = document.getElementById('resultImg');
    const logDiv = document.getElementById('log');
    
    const brightnessValue = document.getElementById('brightnessValue');
    const contrastValue = document.getElementById('contrastValue');
    const saturationValue = document.getElementById('saturationValue');

    function addLog(message, type = 'info') {
      const entry = document.createElement('div');
      entry.className = `log-entry ${type === 'error' ? 'log-error' : type === 'success' ? 'log-success' : ''}`;
      entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
      logDiv.appendChild(entry);
      logDiv.scrollTop = logDiv.scrollHeight;
    }

    enhancer.on('statusChange', (progress) => {
      statusDiv.innerText = `Статус: ${progress.status} | Прогресс: ${progress.progress}%`;
      addLog(`Статус: ${progress.status}, Прогресс: ${progress.progress}%`);
    });

    document.getElementById('fileInput').addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;

      resultsDiv.classList.add('hidden');
      originalImg.src = '';
      resultImg.src = '';
      
      addLog(`Файл: ${file.name} (${(file.size / 1024 / 1024).toFixed(2)} MB)`);
      statusDiv.innerText = 'Запуск...';
      
      try {
        const taskId = await enhancer.submitTask(file);
        addLog(`Задача: ${taskId}`);
        
        const result = await enhancer.getResult(taskId);
        const { blob, params, originalBlob } = result;
        
        addLog(`Результат: ${(blob.size / 1024).toFixed(2)} KB`, 'success');
        
        // Показываем оригинал (для HEIC это будет сконвертированный JPEG)
        originalImg.src = URL.createObjectURL(originalBlob);
        
        // Показываем результат обработки
        resultImg.src = URL.createObjectURL(blob);
        
        // Показываем параметры
        brightnessValue.textContent = params.brightness.toFixed(3);
        contrastValue.textContent = params.contrast.toFixed(3);
        saturationValue.textContent = params.saturation.toFixed(3);
        
        addLog(`Параметры: B=${params.brightness.toFixed(3)}, C=${params.contrast.toFixed(3)}, S=${params.saturation.toFixed(3)}`, 'success');
        
        resultsDiv.classList.remove('hidden');
        statusDiv.innerText = 'Готово!';
        
      } catch (err) {
        addLog(`Ошибка: ${err.message}`, 'error');
        statusDiv.innerText = 'Ошибка';
      }
    });
  </script>
</body>
</html>
